<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#FF6B8A"/>
  <!-- Megaphone body -->
  <polygon points="18,24 38,16 38,48 18,40" fill="#FFFFFF" rx="2"/>
  <!-- Megaphone opening highlight -->
  <ellipse cx="38" cy="32" rx="3" ry="16" fill="#FFE0E8"/>
  <!-- Megaphone handle -->
  <rect x="14" y="28" width="6" height="8" rx="2" fill="#FFFFFF"/>
  <!-- Star 1 (top right) -->
  <polygon points="48,14 50,20 56,20 51,24 53,30 48,26 43,30 45,24 40,20 46,20" fill="#FFD700"/>
  <!-- Star 2 (small, bottom right) -->
  <polygon points="50,42 51,45 54,45 52,47 53,50 50,48 47,50 48,47 46,45 49,45" fill="#FFD700"/>
  <!-- Sound lines -->
  <path d="M42,26 Q46,22 42,18" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M42,46 Q46,42 42,38" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
